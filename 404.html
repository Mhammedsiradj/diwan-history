<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | ديوان التاريخ الإسلامي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lateef:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .error-container {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 3rem;
        }
        .error-number {
            font-size: 8rem;
            font-weight: bold;
            color: var(--gold-primary);
            text-shadow: 0 0 20px rgba(233,196,131,0.3);
        }
        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0;
        }
        .error-description {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .home-button {
            background: rgba(233,196,131,0.15);
            border: 1px solid var(--gold-primary);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            color: var(--gold-primary);
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .home-button:hover {
            background: var(--gold-primary);
            color: var(--dark-bg);
        }
    </style>

    <script src="assets/js/security.js"></script>
</head>
<body>
<div id="header"></div>
<div class="container">
    <div class="error-container">
        <div class="error-number">404</div>
        <div class="error-message">عذراً، الصفحة غير موجودة</div>
        <div class="error-description">الصفحة التي تبحث عنها ربما تم حذفها أو تغيير عنوانها</div>
        <a href="index.html" class="home-button"><i class="fas fa-home"></i> العودة إلى الرئيسية</a>
    </div>
</div>
<div id="footer"></div>
<script src="assets/js/main.js"></script>

</body>
</html>
